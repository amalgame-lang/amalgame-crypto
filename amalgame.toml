# Package manifest — amalgame-crypto
#
# Pure-Amalgame crypto facade — SHA-256 (FIPS 180-4) and
# HMAC-SHA-256 (RFC 2104) primitives. Originally bundled in amc's
# src/stdlib/crypto.am; extracted into this external package as
# part of the framework split (project F follow-up, amc >= 0.7.5).
#
# Installation:
#
#   amc package add crypto                  # via curated index
#   amc package add github.com/amalgame-lang/amalgame-crypto@v0.1.0
#
# At install time amc precompiles `facade.am` into
# `<pkg-cache>/build/<platform>/libamalgame-pkg-Crypto.a` (PR #377
# infra). User builds then auto-pass `--external facade.am` and
# auto-link the archive.

[package]
name              = "amalgame-crypto"
version           = "0.2.0"
license           = "Apache-2.0"
description       = "Crypto facade for Amalgame: SHA-256 (FIPS 180-4) + HMAC-SHA-256 (RFC 2104) + AES-256-GCM AEAD (NIST SP 800-38D)."
authors           = ["Bastien Mouget"]
required-amalgame = ">=0.7.6"
schema-version    = 1

[stdlib]
# v0.1.0 — Sha256 + Hmac (pure-AM via @c {} blocks).
# v0.2.0 — Aead + AeadResult (AES-256-GCM via OpenSSL EVP).
classes   = ["Sha256", "Hmac", "Aead", "AeadResult"]
header    = "facade-stub.h"
namespace = "Amalgame.Crypto"
facade    = "facade.am"

# v0.2.0: link libcrypto for AES-256-GCM (EVP_aes_256_gcm).
# OpenSSL is already in the dependency tree of every Mosaic app
# (amalgame-tls links it for TLS), so this doesn't enlarge the
# external footprint.
libs      = ["crypto"]
